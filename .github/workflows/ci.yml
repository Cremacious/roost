name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Lint, Unit, Build
    runs-on: ubuntu-latest
    env:
      CI: true
      DATABASE_URL: ${{ secrets.DATABASE_URL != '' && secrets.DATABASE_URL || 'postgres://postgres:postgres@127.0.0.1:5432/roost?sslmode=require' }}
      BETTER_AUTH_SECRET: ${{ secrets.BETTER_AUTH_SECRET != '' && secrets.BETTER_AUTH_SECRET || 'ci-better-auth-secret-please-change-me-123456' }}
      BETTER_AUTH_URL: http://localhost:3000
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY != '' && secrets.STRIPE_SECRET_KEY || 'sk_test_ci_placeholder' }}
      STRIPE_PRICE_ID: ${{ secrets.STRIPE_PRICE_ID != '' && secrets.STRIPE_PRICE_ID || 'price_ci_placeholder' }}
      STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET != '' && secrets.STRIPE_WEBHOOK_SECRET || 'whsec_ci_placeholder' }}
      AZURE_DOCUMENT_INTELLIGENCE_ENDPOINT: ${{ secrets.AZURE_DOCUMENT_INTELLIGENCE_ENDPOINT != '' && secrets.AZURE_DOCUMENT_INTELLIGENCE_ENDPOINT || 'https://example.cognitiveservices.azure.com/' }}
      AZURE_DOCUMENT_INTELLIGENCE_KEY: ${{ secrets.AZURE_DOCUMENT_INTELLIGENCE_KEY != '' && secrets.AZURE_DOCUMENT_INTELLIGENCE_KEY || 'ci-azure-placeholder-key' }}
      ADMIN_EMAIL: ${{ secrets.ADMIN_EMAIL != '' && secrets.ADMIN_EMAIL || 'admin@roost.test' }}
      ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD != '' && secrets.ADMIN_PASSWORD || 'RoostAdminPlaceholder123!' }}
      ADMIN_SESSION_SECRET: ${{ secrets.ADMIN_SESSION_SECRET != '' && secrets.ADMIN_SESSION_SECRET || 'ci-admin-session-secret-please-change-me-123456' }}
      CRON_SECRET: ${{ secrets.CRON_SECRET != '' && secrets.CRON_SECRET || 'ci-cron-secret-please-change-me-123456' }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Write CI environment file
        run: |
          cat <<EOF > .env.local
          DATABASE_URL=${DATABASE_URL}
          BETTER_AUTH_SECRET=${BETTER_AUTH_SECRET}
          BETTER_AUTH_URL=${BETTER_AUTH_URL}
          NEXT_PUBLIC_APP_URL=${NEXT_PUBLIC_APP_URL}
          STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
          STRIPE_PRICE_ID=${STRIPE_PRICE_ID}
          STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET}
          AZURE_DOCUMENT_INTELLIGENCE_ENDPOINT=${AZURE_DOCUMENT_INTELLIGENCE_ENDPOINT}
          AZURE_DOCUMENT_INTELLIGENCE_KEY=${AZURE_DOCUMENT_INTELLIGENCE_KEY}
          ADMIN_EMAIL=${ADMIN_EMAIL}
          ADMIN_PASSWORD=${ADMIN_PASSWORD}
          ADMIN_SESSION_SECRET=${ADMIN_SESSION_SECRET}
          CRON_SECRET=${CRON_SECRET}
          EOF

      - name: Run ESLint
        run: npm run lint

      - name: Run unit tests
        run: npm test -- --runInBand

      - name: Run production build
        run: npm run build

  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    needs: verify
  
    env:
      CI: true
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      BETTER_AUTH_SECRET: ${{ secrets.BETTER_AUTH_SECRET != '' && secrets.BETTER_AUTH_SECRET || 'ci-better-auth-secret-please-change-me-123456' }}
      BETTER_AUTH_URL: http://localhost:3000
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY != '' && secrets.STRIPE_SECRET_KEY || 'sk_test_ci_placeholder' }}
      STRIPE_PRICE_ID: ${{ secrets.STRIPE_PRICE_ID != '' && secrets.STRIPE_PRICE_ID || 'price_ci_placeholder' }}
      STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET != '' && secrets.STRIPE_WEBHOOK_SECRET || 'whsec_ci_placeholder' }}
      AZURE_DOCUMENT_INTELLIGENCE_ENDPOINT: ${{ secrets.AZURE_DOCUMENT_INTELLIGENCE_ENDPOINT != '' && secrets.AZURE_DOCUMENT_INTELLIGENCE_ENDPOINT || 'https://example.cognitiveservices.azure.com/' }}
      AZURE_DOCUMENT_INTELLIGENCE_KEY: ${{ secrets.AZURE_DOCUMENT_INTELLIGENCE_KEY != '' && secrets.AZURE_DOCUMENT_INTELLIGENCE_KEY || 'ci-azure-placeholder-key' }}
      ADMIN_EMAIL: ${{ secrets.ADMIN_EMAIL != '' && secrets.ADMIN_EMAIL || 'admin@roost.test' }}
      ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD != '' && secrets.ADMIN_PASSWORD || 'RoostAdminPlaceholder123!' }}
      ADMIN_SESSION_SECRET: ${{ secrets.ADMIN_SESSION_SECRET != '' && secrets.ADMIN_SESSION_SECRET || 'ci-admin-session-secret-please-change-me-123456' }}
      CRON_SECRET: ${{ secrets.CRON_SECRET != '' && secrets.CRON_SECRET || 'ci-cron-secret-please-change-me-123456' }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium webkit

      - name: Write CI environment file
        run: |
          cat <<EOF > .env.local
          DATABASE_URL=${DATABASE_URL}
          BETTER_AUTH_SECRET=${BETTER_AUTH_SECRET}
          BETTER_AUTH_URL=${BETTER_AUTH_URL}
          NEXT_PUBLIC_APP_URL=${NEXT_PUBLIC_APP_URL}
          STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
          STRIPE_PRICE_ID=${STRIPE_PRICE_ID}
          STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET}
          AZURE_DOCUMENT_INTELLIGENCE_ENDPOINT=${AZURE_DOCUMENT_INTELLIGENCE_ENDPOINT}
          AZURE_DOCUMENT_INTELLIGENCE_KEY=${AZURE_DOCUMENT_INTELLIGENCE_KEY}
          ADMIN_EMAIL=${ADMIN_EMAIL}
          ADMIN_PASSWORD=${ADMIN_PASSWORD}
          ADMIN_SESSION_SECRET=${ADMIN_SESSION_SECRET}
          CRON_SECRET=${CRON_SECRET}
          EOF

      - name: Run Playwright
        run: npm run test:e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            .playwright/report
            .playwright/test-results
          if-no-files-found: ignore
